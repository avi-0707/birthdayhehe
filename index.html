<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD // 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --accent: #ff007a;
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            background: #050505; 
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: white;
        }

        /* The Aesthetic Overlay */
        #ui-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
        }

        .glass-card {
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(20px) saturate(180%);
            padding: 60px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            pointer-events: auto;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin: 0;
            background: linear-gradient(to right, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.3));
        }

        .wish-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.7);
            margin: 30px 0;
            font-weight: 300;
            letter-spacing: 1px;
        }

        #btn {
            background: white;
            border: none;
            padding: 16px 45px;
            color: black;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #btn:hover {
            transform: scale(1.1);
            background: var(--primary);
            box-shadow: 0 0 30px var(--primary);
        }

        canvas { position: fixed; top: 0; left: 0; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="glass-card">
            <h1>HBD.26</h1>
            <div class="wish-text">
                ANOTHER YEAR OF <span style="color: var(--primary)">CREATING</span>,<br>
                ANOTHER YEAR OF <span style="color: var(--accent)">EVOLVING</span>.<br>
                THE FUTURE IS YOURS TO BUILD.
            </div>
            <button id="btn" onclick="celebrate()">Launch Joy</button>
        </div>
    </div>

    <script>
        let scene, camera, renderer, starGeo, stars;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 1;
            camera.rotation.x = Math.PI/2;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            starGeo = new THREE.BufferGeometry();
            let positions = [];
            let velocities = [];
            for(let i=0; i<8000; i++) {
                positions.push(Math.random() * 600 - 300, Math.random() * 600 - 300, Math.random() * 600 - 300);
                velocities.push(0);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            
            let sprite = new THREE.TextureLoader().load('https://threejs.org/examples/textures/sprites/disc.png');
            let starMaterial = new THREE.PointsMaterial({
                color: 0x444444,
                size: 0.5,
                map: sprite,
                transparent: true,
                blending: THREE.AdditiveBlending
            });

            stars = new THREE.Points(starGeo, starMaterial);
            scene.add(stars);

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            let positions = starGeo.attributes.position.array;
            for(let i=0; i<positions.length; i+=3) {
                positions[i+1] -= 0.9; // Speed of the warp
                if (positions[i+1] < -200) {
                    positions[i+1] = 200;
                }
            }
            starGeo.attributes.position.needsUpdate = true;
            stars.rotation.y += 0.001;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        function celebrate() {
            // Change star colors to neon
            const colors = [0x00f2ff, 0x7000ff, 0xff007a];
            stars.material.color.setHex(colors[Math.floor(Math.random() * colors.length)]);
            
            confetti({
                particleCount: 150,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#00f2ff', '#7000ff', '#ff007a'],
                disableForReducedMotion: true
            });
        }

        init();
    </script>
</body>
</html>
