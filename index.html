<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎂</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; overflow-x: hidden; font-family: 'Segoe UI', sans-serif; background: #000; color: white; }
        #ui-layer { position: absolute; width: 100%; top: 10%; z-index: 10; text-align: center; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            display: inline-block;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Image Gallery Styling */
        .gallery {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
            padding: 20px;
        }

        .gallery img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            border: 3px solid #ff0080;
            transition: 0.3s;
        }

        .gallery img:hover { transform: scale(1.1) rotate(5deg); }

        #btn {
            background: linear-gradient(45deg, #ff0080, #7928ca);
            border: none; padding: 15px 40px; color: white;
            font-weight: bold; border-radius: 50px; cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div class="glass-card">
            <h1>Happy Birthday! 🎉</h1>
            <button id="btn" onclick="launchCelebration()">Click for Surprise</button>
            
            <div class="gallery">
                <img src="images/photo1.jpeg" alt="Bday Memory 1">
                <img src="images/person.jpeg" alt="Bday Memory 2">
                <img src="images/photo3.jpeg" alt="Bday Memory 3">
                <img src="images/photo4.jpeg" alt="Bday Memory 4">
                <img src="images/photo5.jpeg" alt="Bday Memory 5">
            </div>
        </div>
    </div>

    <script>
        // Three.js Background Logic
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for (let i = 0; i < 2000; i++) {
            vertices.push(THREE.MathUtils.randFloatSpread(1500), THREE.MathUtils.randFloatSpread(1500), THREE.MathUtils.randFloatSpread(1500));
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        const material = new THREE.PointsMaterial({ color: 0x00d4ff, size: 4 });
        const points = new THREE.Points(geometry, material);
        scene.add(points);
        camera.position.z = 500;

        function animate() {
            requestAnimationFrame(animate);
            points.rotation.y += 0.002;
            renderer.render(scene, camera);
        }
        animate();

        function launchCelebration() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    </script>
</body>
</html>
